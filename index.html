<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkyPredict AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-4xl w-full bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
        <div class="bg-indigo-600 p-10 text-white">
            <h1 class="text-3xl font-extrabold tracking-tight italic">✈️ SKYPREDICT AI</h1>
            <p class="text-indigo-100 mt-2 font-medium opacity-90 uppercase tracking-widest text-xs">Professional Flight Delay Intelligence</p>
        </div>
        
        <div class="p-10 grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="space-y-6">
                <h3 class="text-lg font-bold text-slate-800 border-b pb-2">Flight Parameters</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Airline</label>
                        <select id="airline" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none focus:border-indigo-500">
                            <option>SkyBound</option><option>GlobalAir</option><option>AirWave</option><option>JetStream</option>
                            <option>Emirates</option><option>AIRIndia</option><option>QatarAirways</option><option>BRITISH AIRWAYS</option>
                            <option>AirFrance</option><option>Lufthansa</option><option>Iberia</option><option>Alitalia</option>
                            <option>INDIGO</option><option>AirAsia</option><option>SpiceJet</option><option>GoAir</option><option>VISTARA</option>
                        </select>
                    </div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Hour (0-23)</label><input id="hour" type="number" value="10" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Weather</label><select id="weather" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold"><option>Clear</option><option>Rain</option><option>Cloudy</option><option>Fog</option></select></div>
                </div>
            </div>

            <div class="space-y-6">
                <h3 class="text-lg font-bold text-slate-800 border-b pb-2">Conditions</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Temp (°C)</label><input id="temp" type="number" value="25" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Wind (km/h)</label><input id="wind" type="number" value="15" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Visibility (km)</label><input id="vis" type="number" value="10" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Congestion (0-1)</label><input id="cong" type="number" step="0.1" value="0.4" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold"></div>
                </div>
                <button onclick="predict()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100 uppercase tracking-widest">Predict Delay Risk</button>
            </div>
        </div>

        <div id="result" class="m-10 hidden p-8 rounded-[2rem] border-4 text-center transition-all">
            <h2 id="status" class="text-5xl font-black mb-2"></h2>
            <p id="prob" class="text-slate-500 font-bold"></p>
        </div>
    </div>

    <script>
        async function predict() {
            const payload = {
                airline: document.getElementById('airline').value,
                hour: document.getElementById('hour').value,
                weather: document.getElementById('weather').value,
                temp: document.getElementById('temp').value,
                wind: document.getElementById('wind').value,
                vis: document.getElementById('vis').value,
                cong: document.getElementById('cong').value
            };
            const response = await fetch('/predict', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            const box = document.getElementById('result');
            box.classList.remove('hidden');
            document.getElementById('status').innerText = data.status;
            document.getElementById('prob').innerText = data.probability + "% Delay Probability";
            const color = data.status === 'High Risk' ? '#ef4444' : data.status === 'Moderate Risk' ? '#f59e0b' : '#16a34a';
            box.style.borderColor = color;
            document.getElementById('status').style.color = color;
            box.style.backgroundColor = color + '11';
        }
    </script>
</body>
</html>
